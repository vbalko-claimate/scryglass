<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scryglass — Starting</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
}
.spinner {
    width: 40px; height: 40px;
    border: 3px solid #333;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#status { font-size: 14px; color: #888; margin-bottom: 8px; }
#detail { font-size: 11px; color: #555; max-width: 400px; text-align: center; }
#error-box {
    display: none;
    background: rgba(233, 57, 70, 0.1);
    border: 1px solid rgba(233, 57, 70, 0.3);
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
    max-width: 450px;
    text-align: left;
}
#error-box h3 { color: #ef5350; font-size: 14px; margin-bottom: 8px; }
#error-log {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: #999;
    background: rgba(0,0,0,0.3);
    padding: 8px;
    border-radius: 4px;
    max-height: 150px;
    overflow-y: auto;
    white-space: pre-wrap;
    margin-bottom: 12px;
}
.btn {
    display: inline-block;
    padding: 8px 16px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin-right: 8px;
}
.btn:hover { background: #c73650; }
.btn-secondary { background: transparent; border: 1px solid #444; color: #aaa; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div id="status">Starting Scryglass...</div>
<div id="detail">Initializing advisor engine</div>

<div id="error-box">
    <h3>Server failed to start</h3>
    <div id="error-log"></div>
    <button class="btn" onclick="retry()">Retry</button>
    <button class="btn btn-secondary" onclick="openSetup()">Open Setup</button>
    <button class="btn btn-secondary" onclick="copyLog()">Copy Log</button>
</div>

<script>
const SERVER = 'http://localhost:8765';
const MAX_WAIT = 45;
let attempt = 0;
let logs = [];

function log(msg) {
    logs.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
    document.getElementById('detail').textContent = msg;
}

async function checkServer() {
    attempt++;
    log(`Health check #${attempt}...`);

    try {
        const res = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
            const data = await res.json();
            log(`Server ready: engine ${data.engine_version}, ${data.card_count} cards`);
            document.getElementById('status').textContent = 'Ready!';
            // Redirect to main UI
            setTimeout(() => { window.location.href = SERVER; }, 500);
            return;
        }
    } catch(e) {
        // Not ready yet
    }

    if (attempt >= MAX_WAIT) {
        showError();
        return;
    }

    // Update status message
    if (attempt < 5) {
        document.getElementById('status').textContent = 'Starting server...';
    } else if (attempt < 15) {
        document.getElementById('status').textContent = 'Loading card database...';
    } else if (attempt < 30) {
        document.getElementById('status').textContent = 'Almost ready...';
    } else {
        document.getElementById('status').textContent = 'Taking longer than usual...';
    }

    setTimeout(checkServer, 1000);
}

function showError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').textContent = 'Failed to start';
    document.getElementById('detail').textContent = '';

    const errorBox = document.getElementById('error-box');
    errorBox.style.display = 'block';

    const logText = logs.join('\n');
    document.getElementById('error-log').textContent = logText +
        '\n\nPossible causes:\n' +
        '- Python sidecar failed to start\n' +
        '- Port 8765 is already in use\n' +
        '- Missing dependencies\n' +
        '- MTGA data directory not found';
}

function retry() {
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    attempt = 0;
    logs = [];
    checkServer();
}

function openSetup() {
    window.location.href = `${SERVER}/setup`;
}

function copyLog() {
    navigator.clipboard.writeText(logs.join('\n')).then(() => {
        alert('Log copied to clipboard');
    });
}

// Start checking
checkServer();
</script>
</body>
</html>
