<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scryglass Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
}

#overlay {
    position: fixed;
    top: 0; left: 0;
    width: 280px;
    padding: 10px 12px;
    background: rgba(12, 12, 18, 0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    color: rgba(240, 238, 230, 0.95);
    transition: opacity 0.15s ease-out;
}

#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay.compact { padding: 6px 10px; }

/* Opponent line */
.opp-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(200, 198, 190, 0.8);
    margin-bottom: 6px;
    min-height: 18px;
}
.opp-deck {
    font-weight: 600;
    color: rgba(240, 238, 230, 0.95);
}
.opp-conf {
    font-size: 10px;
    color: rgba(160, 158, 150, 0.6);
}
.opp-conf.high { color: #81c784; }
.opp-conf.mid { color: #ffc107; }
.opp-conf.low { color: rgba(160, 158, 150, 0.5); }

/* Key play */
.key-play {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-height: 22px;
}
.key-play-indicator {
    width: 3px;
    min-height: 18px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
}
.key-play-indicator.critical { background: #E63946; }
.key-play-indicator.high { background: #F4A261; }
.key-play-indicator.medium { background: #6C9A8B; }
.key-play-indicator.low { background: rgba(139, 139, 153, 0.5); }

.key-play-text {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
}

/* Threat warning */
.threat-line {
    font-size: 11px;
    color: #F4A261;
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: none;
}
.threat-line.visible { display: block; }

/* Phase indicator */
.phase-line {
    font-size: 10px;
    color: rgba(160, 158, 150, 0.4);
    margin-top: 4px;
    text-align: right;
}

/* Do Now (expandable) */
.do-now {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: none;
}
.do-now.visible { display: block; }
.do-now-item {
    font-size: 11px;
    color: rgba(200, 198, 190, 0.7);
    padding: 2px 0;
    padding-left: 11px;
    position: relative;
}
.do-now-item::before {
    content: '·';
    position: absolute;
    left: 3px;
    color: rgba(160, 158, 150, 0.4);
}

/* No match — completely invisible (background too) */
#overlay.no-match {
    background: transparent !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    border-color: transparent !important;
}
#overlay.no-match * {
    visibility: hidden;
}

.waiting {
    font-size: 11px;
    color: rgba(160, 158, 150, 0.4);
    font-style: italic;
}

/* Hand bar — floating at bottom of screen */
#hand-bar {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 4px 8px;
    background: rgba(12, 12, 18, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 6px;
    visibility: hidden;
}
#hand-bar.visible { visibility: visible; }

.hand-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3px 6px;
    border-radius: 4px;
    min-width: 48px;
    font-size: 10px;
    line-height: 1.2;
    border-left: 2px solid transparent;
}
.hand-card.castable {
    border-left-color: #81c784;
    background: rgba(76, 175, 80, 0.1);
}
.hand-card.not-castable {
    border-left-color: rgba(100, 100, 100, 0.3);
    opacity: 0.5;
}
.hand-card.is-land {
    border-left-color: #F4A261;
    background: rgba(244, 162, 97, 0.1);
}
.hand-card.recommended {
    border-left-color: #E63946;
    background: rgba(233, 57, 70, 0.15);
    box-shadow: 0 0 6px rgba(233, 57, 70, 0.2);
}
.hand-card-name {
    color: rgba(220, 218, 210, 0.9);
    font-weight: 500;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.hand-card-cost {
    color: rgba(160, 158, 150, 0.6);
    font-size: 9px;
}

/* Threat bar — floating at top for opponent creatures */
#threat-bar {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 4px 8px;
    background: rgba(18, 8, 8, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(233, 57, 70, 0.15);
    border-radius: 6px;
    visibility: hidden;
}
#threat-bar.visible { visibility: visible; }

.threat-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3px 6px;
    border-radius: 4px;
    min-width: 48px;
    font-size: 10px;
    line-height: 1.2;
}
.threat-card.must-answer {
    background: rgba(233, 57, 70, 0.15);
    border: 1px solid rgba(233, 57, 70, 0.3);
}
.threat-card-name {
    color: rgba(239, 83, 80, 0.9);
    font-weight: 500;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.threat-card-stat {
    color: rgba(200, 150, 150, 0.6);
    font-size: 9px;
}
</style>
</head>
<body>
<div id="overlay" class="no-match">
    <div class="opp-line" id="opp-line">
        <span class="waiting" id="waiting-msg">Waiting for match...</span>
    </div>
    <div class="key-play" id="key-play" style="display:none">
        <div class="key-play-indicator medium" id="key-play-indicator"></div>
        <div class="key-play-text" id="key-play-text"></div>
    </div>
    <div class="threat-line" id="threat-line"></div>
    <div class="do-now" id="do-now"></div>
    <div class="phase-line" id="phase-line"></div>
</div>

<div id="threat-bar"></div>
<div id="hand-bar"></div>

<script>
let ws = null;
let currentStrategyInfo = null;
let isMyTurn = false;
let inMatch = false;

function connect() {
    ws = new WebSocket(`ws://${location.hostname}:8765/ws`);
    ws.onopen = () => {};
    ws.onclose = () => setTimeout(connect, 2000);
    ws.onerror = () => {};
    ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        switch (msg.type) {
            case 'state_update':
                updateState(msg.data);
                break;
            case 'advice':
                updateAdvice(msg.data);
                break;
            case 'strategy_info':
                currentStrategyInfo = msg.data;
                updateOppLine(msg.data);
                break;
            case 'match_start':
                inMatch = true;
                document.getElementById('overlay').classList.remove('no-match');
                break;
            case 'match_end':
                inMatch = false;
                resetOverlay();
                break;
        }
    };
}

function updateState(state) {
    const ti = state.turn || {};
    isMyTurn = ti.is_my_turn === true;
    const overlay = document.getElementById('overlay');

    // Show overlay if we get state updates (match is active)
    if (ti.number > 0 && !inMatch) {
        inMatch = true;
        overlay.classList.remove('no-match');
    }

    // Phase-adaptive: compact on opponent's turn
    if (isMyTurn) {
        overlay.classList.remove('compact');
        document.getElementById('do-now').classList.add('visible');
    } else {
        overlay.classList.add('compact');
        document.getElementById('do-now').classList.remove('visible');
    }

    // Phase line
    const phase = ti.phase_display || '';
    const turnNum = ti.number || '';
    if (turnNum) {
        document.getElementById('phase-line').textContent =
            `T${turnNum} · ${phase} · ${isMyTurn ? 'Your turn' : 'Opp turn'}`;
    }

    // Update card bars
    updateHandBar(state);
    updateThreatBar(state);
}

function updateOppLine(info) {
    const el = document.getElementById('opp-line');
    const waitMsg = document.getElementById('waiting-msg');

    if (info && info.opp_deck) {
        const conf = info.opp_confidence || 0;
        const confClass = conf >= 80 ? 'high' : conf >= 50 ? 'mid' : 'low';
        waitMsg.style.display = 'none';
        el.innerHTML = `<span class="opp-deck">${info.opp_deck}</span>`
            + `<span class="opp-conf ${confClass}">${conf}%</span>`;
    } else if (info && info.strategy_name) {
        waitMsg.style.display = 'none';
        el.innerHTML = `<span class="opp-deck">${info.strategy_name}</span>`;
    } else {
        waitMsg.style.display = '';
        waitMsg.textContent = 'Waiting for match...';
    }
}

function updateAdvice(data) {
    const items = data.items || data || [];
    lastAdvice = items;
    if (!items.length) return;

    // Find spotlight (highest priority with action_scores)
    const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const sorted = [...items].sort((a, b) => {
        const pa = priorityOrder[a.priority] ?? 4;
        const pb = priorityOrder[b.priority] ?? 4;
        if (pa !== pb) return pa - pb;
        const sa = a.action_scores?.length ? Math.max(...a.action_scores.map(s => s.score)) : 0;
        const sb = b.action_scores?.length ? Math.max(...b.action_scores.map(s => s.score)) : 0;
        return sb - sa;
    });

    // Key play = first "now" item (heuristic or strategy, not intel)
    const nowItems = sorted.filter(a => a.source !== 'intel');
    const intelItems = sorted.filter(a => a.source === 'intel');

    const keyPlay = nowItems[0];
    if (keyPlay) {
        const el = document.getElementById('key-play');
        const indicator = document.getElementById('key-play-indicator');
        const text = document.getElementById('key-play-text');

        el.style.display = 'flex';
        indicator.className = 'key-play-indicator ' + (keyPlay.priority || 'medium');
        text.textContent = keyPlay.message;
    }

    // Do now (next 2 items)
    const doNow = document.getElementById('do-now');
    const secondary = nowItems.slice(1, 4);
    if (secondary.length && isMyTurn) {
        doNow.classList.add('visible');
        doNow.innerHTML = secondary.map(a =>
            `<div class="do-now-item">${a.message}</div>`
        ).join('');
    } else {
        doNow.classList.remove('visible');
    }

    // Threat line (from intel)
    const threat = intelItems.find(a => a.priority === 'high' || a.priority === 'critical');
    const threatEl = document.getElementById('threat-line');
    if (threat) {
        threatEl.textContent = '⚠ ' + threat.message;
        threatEl.classList.add('visible');
    } else {
        threatEl.classList.remove('visible');
    }
}

function updateHandBar(state) {
    const bar = document.getElementById('hand-bar');
    const hand = state.hand || state.my_hand || [];
    const myBf = state.my_battlefield || [];
    const mana = myBf.filter(c => c.is_land && !c.is_tapped).length;
    // Get recommended cards from current advice
    const recommended = new Set();
    if (lastAdvice) {
        for (const a of lastAdvice) {
            if (a.recommended_cards) {
                a.recommended_cards.forEach(c => recommended.add(c));
            }
        }
    }

    if (!hand.length || !inMatch) {
        bar.classList.remove('visible');
        return;
    }

    bar.innerHTML = hand.map(c => {
        const isLand = c.is_land || (c.card_types || []).includes('Land');
        const castable = !isLand && c.cmc <= mana;
        const isRec = recommended.has(c.name);
        let cls = 'hand-card';
        if (isRec) cls += ' recommended';
        else if (isLand) cls += ' is-land';
        else if (castable) cls += ' castable';
        else cls += ' not-castable';

        const shortName = c.name.length > 12 ? c.name.substring(0, 11) + '…' : c.name;
        const cost = isLand ? '🏔' : `${c.cmc}`;
        return `<div class="${cls}">
            <span class="hand-card-name">${shortName}</span>
            <span class="hand-card-cost">${cost}</span>
        </div>`;
    }).join('');
    bar.classList.add('visible');
}

function updateThreatBar(state) {
    const bar = document.getElementById('threat-bar');
    const opp = state.opp_battlefield || [];
    const creatures = opp.filter(c => c.is_creature);

    if (!creatures.length || !inMatch) {
        bar.classList.remove('visible');
        return;
    }

    // Show only creatures with power > 0
    const threats = creatures.filter(c => c.power > 0).sort((a, b) => b.power - a.power).slice(0, 6);
    if (!threats.length) {
        bar.classList.remove('visible');
        return;
    }

    // Check which are "must answer" from strategy info
    const mustAnswer = new Set();
    if (currentStrategyInfo && currentStrategyInfo.opp_key_threats) {
        currentStrategyInfo.opp_key_threats.forEach(t => {
            const name = typeof t === 'string' ? t : t.card;
            if (name) mustAnswer.add(name);
        });
    }

    bar.innerHTML = threats.map(c => {
        const isMust = mustAnswer.has(c.name);
        const cls = 'threat-card' + (isMust ? ' must-answer' : '');
        const shortName = c.name.length > 12 ? c.name.substring(0, 11) + '…' : c.name;
        return `<div class="${cls}">
            <span class="threat-card-name">${shortName}</span>
            <span class="threat-card-stat">${c.power}/${c.toughness}</span>
        </div>`;
    }).join('');
    bar.classList.add('visible');
}

let lastAdvice = null;

function resetOverlay() {
    inMatch = false;
    document.getElementById('overlay').classList.add('no-match');
    document.getElementById('hand-bar').classList.remove('visible');
    document.getElementById('threat-bar').classList.remove('visible');
    document.getElementById('key-play').style.display = 'none';
    document.getElementById('threat-line').classList.remove('visible');
    document.getElementById('do-now').classList.remove('visible');
    document.getElementById('opp-line').innerHTML =
        '<span class="waiting" id="waiting-msg">Waiting for match...</span>';
    document.getElementById('phase-line').textContent = '';
}

connect();
</script>
</body>
</html>
