<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scryglass Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
}

#overlay {
    position: fixed;
    top: 8px; left: 8px;
    width: 280px;
    padding: 10px 12px;
    background: rgba(12, 12, 18, 0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    color: rgba(240, 238, 230, 0.95);
    transition: opacity 0.15s ease-out;
}

#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay.compact { padding: 6px 10px; }

/* Opponent line */
.opp-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(200, 198, 190, 0.8);
    margin-bottom: 6px;
    min-height: 18px;
}
.opp-deck {
    font-weight: 600;
    color: rgba(240, 238, 230, 0.95);
}
.opp-conf {
    font-size: 10px;
    color: rgba(160, 158, 150, 0.6);
}
.opp-conf.high { color: #81c784; }
.opp-conf.mid { color: #ffc107; }
.opp-conf.low { color: rgba(160, 158, 150, 0.5); }

/* Key play */
.key-play {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-height: 22px;
}
.key-play-indicator {
    width: 3px;
    min-height: 18px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
}
.key-play-indicator.critical { background: #E63946; }
.key-play-indicator.high { background: #F4A261; }
.key-play-indicator.medium { background: #6C9A8B; }
.key-play-indicator.low { background: rgba(139, 139, 153, 0.5); }

.key-play-text {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
}

/* Threat warning */
.threat-line {
    font-size: 11px;
    color: #F4A261;
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: none;
}
.threat-line.visible { display: block; }

/* Phase indicator */
.phase-line {
    font-size: 10px;
    color: rgba(160, 158, 150, 0.4);
    margin-top: 4px;
    text-align: right;
}

/* Do Now (expandable) */
.do-now {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: none;
}
.do-now.visible { display: block; }
.do-now-item {
    font-size: 11px;
    color: rgba(200, 198, 190, 0.7);
    padding: 2px 0;
    padding-left: 11px;
    position: relative;
}
.do-now-item::before {
    content: '·';
    position: absolute;
    left: 3px;
    color: rgba(160, 158, 150, 0.4);
}

/* No match — completely invisible (background too) */
#overlay.no-match {
    background: transparent !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    border-color: transparent !important;
}
#overlay.no-match * {
    visibility: hidden;
}

.waiting {
    font-size: 11px;
    color: rgba(160, 158, 150, 0.4);
    font-style: italic;
}

/* Floating badges — positioned over approximate card locations */
#hand-badges, #threat-badges {
    position: fixed;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
    visibility: hidden;
}
#hand-badges { bottom: 22%; }
#threat-badges { top: 18%; }
#hand-badges.visible, #threat-badges.visible { visibility: visible; }

.card-badge {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 9px;
    line-height: 1.2;
    text-align: center;
    min-width: 40px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}

/* Hand badges */
.card-badge.castable {
    background: rgba(76, 175, 80, 0.6);
    border: 1px solid rgba(76, 175, 80, 0.8);
    color: #fff;
}
.card-badge.not-castable {
    background: rgba(40, 40, 50, 0.5);
    border: 1px solid rgba(80, 80, 90, 0.4);
    color: rgba(180, 180, 180, 0.6);
}
.card-badge.is-land {
    background: rgba(244, 162, 97, 0.5);
    border: 1px solid rgba(244, 162, 97, 0.7);
    color: #fff;
}
.card-badge.recommended {
    background: rgba(233, 57, 70, 0.7);
    border: 1px solid rgba(233, 57, 70, 0.9);
    color: #fff;
    box-shadow: 0 0 8px rgba(233, 57, 70, 0.4);
    font-weight: 600;
}
.badge-name {
    font-weight: 500;
    max-width: 65px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.badge-sub {
    font-size: 8px;
    opacity: 0.7;
}

/* Threat badges */
.card-badge.threat {
    background: rgba(60, 20, 20, 0.6);
    border: 1px solid rgba(200, 80, 80, 0.4);
    color: rgba(239, 180, 180, 0.9);
}
.card-badge.must-answer {
    background: rgba(233, 57, 70, 0.6);
    border: 1px solid rgba(233, 57, 70, 0.9);
    color: #fff;
    box-shadow: 0 0 8px rgba(233, 57, 70, 0.3);
}
</style>
</head>
<body>
<div id="overlay" class="no-match">
    <div class="opp-line" id="opp-line">
        <span class="waiting" id="waiting-msg">Waiting for match...</span>
    </div>
    <div class="key-play" id="key-play" style="display:none">
        <div class="key-play-indicator medium" id="key-play-indicator"></div>
        <div class="key-play-text" id="key-play-text"></div>
    </div>
    <div class="threat-line" id="threat-line"></div>
    <div class="do-now" id="do-now"></div>
    <div class="phase-line" id="phase-line"></div>
</div>

<div id="threat-badges"></div>
<div id="hand-badges"></div>

<script>
let ws = null;
let currentStrategyInfo = null;
let isMyTurn = false;
let inMatch = false;

function connect() {
    ws = new WebSocket(`ws://${location.hostname}:8765/ws`);
    ws.onopen = () => {};
    ws.onclose = () => setTimeout(connect, 2000);
    ws.onerror = () => {};
    ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        switch (msg.type) {
            case 'state_update':
                updateState(msg.data);
                break;
            case 'advice':
                updateAdvice(msg.data);
                break;
            case 'strategy_info':
                currentStrategyInfo = msg.data;
                updateOppLine(msg.data);
                break;
            case 'match_start':
                inMatch = true;
                document.getElementById('overlay').classList.remove('no-match');
                break;
            case 'match_end':
                inMatch = false;
                resetOverlay();
                showDebrief(msg.data);
                break;
        }
    };
}

function updateState(state) {
    const ti = state.turn || {};
    isMyTurn = ti.is_my_turn === true;
    const overlay = document.getElementById('overlay');

    // Show overlay if we get state updates (match is active)
    if (ti.number > 0 && !inMatch) {
        inMatch = true;
        overlay.classList.remove('no-match');
    }

    // Phase-adaptive: compact on opponent's turn
    if (isMyTurn) {
        overlay.classList.remove('compact');
        document.getElementById('do-now').classList.add('visible');
    } else {
        overlay.classList.add('compact');
        document.getElementById('do-now').classList.remove('visible');
    }

    // Phase line
    const phase = ti.phase_display || '';
    const turnNum = ti.number || '';
    if (turnNum) {
        document.getElementById('phase-line').textContent =
            `T${turnNum} · ${phase} · ${isMyTurn ? 'Your turn' : 'Opp turn'}`;
    }

    // Card badges disabled — experimental, needs better positioning
    // updateHandBadges(state);
    // updateThreatBadges(state);
}

function updateOppLine(info) {
    const el = document.getElementById('opp-line');
    const waitMsg = document.getElementById('waiting-msg');

    if (info && info.opp_deck) {
        const conf = info.opp_confidence || 0;
        const confClass = conf >= 80 ? 'high' : conf >= 50 ? 'mid' : 'low';
        waitMsg.style.display = 'none';
        el.innerHTML = `<span class="opp-deck">${info.opp_deck}</span>`
            + `<span class="opp-conf ${confClass}">${conf}%</span>`;
    } else if (info && info.strategy_name) {
        waitMsg.style.display = 'none';
        el.innerHTML = `<span class="opp-deck">${info.strategy_name}</span>`;
    } else {
        waitMsg.style.display = '';
        waitMsg.textContent = 'Waiting for match...';
    }
}

function updateAdvice(data) {
    const items = data.items || data || [];
    lastAdvice = items;
    if (!items.length) return;

    // Find spotlight (highest priority with action_scores)
    const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const sorted = [...items].sort((a, b) => {
        const pa = priorityOrder[a.priority] ?? 4;
        const pb = priorityOrder[b.priority] ?? 4;
        if (pa !== pb) return pa - pb;
        const sa = a.action_scores?.length ? Math.max(...a.action_scores.map(s => s.score)) : 0;
        const sb = b.action_scores?.length ? Math.max(...b.action_scores.map(s => s.score)) : 0;
        return sb - sa;
    });

    // Key play = first "now" item (heuristic or strategy, not intel)
    const nowItems = sorted.filter(a => a.source !== 'intel');
    const intelItems = sorted.filter(a => a.source === 'intel');

    const keyPlay = nowItems[0];
    if (keyPlay) {
        const el = document.getElementById('key-play');
        const indicator = document.getElementById('key-play-indicator');
        const text = document.getElementById('key-play-text');

        el.style.display = 'flex';
        indicator.className = 'key-play-indicator ' + (keyPlay.priority || 'medium');
        text.textContent = keyPlay.message;
    }

    // Do now (next 2 items)
    const doNow = document.getElementById('do-now');
    const secondary = nowItems.slice(1, 4);
    if (secondary.length && isMyTurn) {
        doNow.classList.add('visible');
        doNow.innerHTML = secondary.map(a =>
            `<div class="do-now-item">${a.message}</div>`
        ).join('');
    } else {
        doNow.classList.remove('visible');
    }

    // Threat line (from intel)
    const threat = intelItems.find(a => a.priority === 'high' || a.priority === 'critical');
    const threatEl = document.getElementById('threat-line');
    if (threat) {
        threatEl.textContent = '⚠ ' + threat.message;
        threatEl.classList.add('visible');
    } else {
        threatEl.classList.remove('visible');
    }
}

function updateHandBadges(state) {
    const el = document.getElementById('hand-badges');
    const hand = state.hand || state.my_hand || [];
    const myBf = state.my_battlefield || [];
    const mana = myBf.filter(c => c.is_land && !c.is_tapped).length;

    const recommended = new Set();
    if (lastAdvice) {
        for (const a of lastAdvice) {
            if (a.recommended_cards) a.recommended_cards.forEach(c => recommended.add(c));
        }
    }

    if (!hand.length || !inMatch) { el.classList.remove('visible'); return; }

    // Group duplicate lands (e.g. 4× Plains → "Plains ×4")
    const grouped = [];
    const seen = {};
    for (const c of hand) {
        const isLand = c.is_land || (c.card_types || []).includes('Land');
        if (isLand && seen[c.name]) {
            seen[c.name].count++;
        } else {
            const entry = { ...c, count: 1 };
            grouped.push(entry);
            if (isLand) seen[c.name] = entry;
        }
    }

    const cardWidth = Math.min(75, Math.floor(window.innerWidth * 0.5 / grouped.length));
    const gap = Math.max(2, Math.floor((window.innerWidth * 0.5 - cardWidth * grouped.length) / Math.max(1, grouped.length - 1)));

    el.style.gap = gap + 'px';
    el.innerHTML = grouped.map(c => {
        const isLand = c.is_land || (c.card_types || []).includes('Land');
        const castable = !isLand && c.cmc <= mana;
        const isRec = recommended.has(c.name);
        let cls = 'card-badge';
        if (isRec) cls += ' recommended';
        else if (isLand) cls += ' is-land';
        else if (castable) cls += ' castable';
        else cls += ' not-castable';

        const shortName = c.name.length > 10 ? c.name.substring(0, 9) + '…' : c.name;
        const countLabel = c.count > 1 ? ` ×${c.count}` : '';
        const sub = isLand ? (c.count > 1 ? `<span class="badge-sub">×${c.count}</span>` : '')
                           : `<span class="badge-sub">${c.cmc} mana</span>`;
        return `<div class="${cls}" style="width:${cardWidth}px">
            <span class="badge-name">${shortName}</span>
            ${sub}
        </div>`;
    }).join('');
    el.classList.add('visible');
}

function updateThreatBadges(state) {
    const el = document.getElementById('threat-badges');
    const opp = state.opp_battlefield || [];
    const creatures = opp.filter(c => c.is_creature && c.power > 0)
        .sort((a, b) => b.power - a.power).slice(0, 7);

    if (!creatures.length || !inMatch) { el.classList.remove('visible'); return; }

    const mustAnswer = new Set();
    if (currentStrategyInfo && currentStrategyInfo.opp_key_threats) {
        currentStrategyInfo.opp_key_threats.forEach(t => {
            const name = typeof t === 'string' ? t : t.card;
            if (name) mustAnswer.add(name);
        });
    }

    const cardWidth = Math.min(75, Math.floor(window.innerWidth * 0.45 / creatures.length));
    const gap = Math.max(2, Math.floor((window.innerWidth * 0.45 - cardWidth * creatures.length) / Math.max(1, creatures.length - 1)));

    el.style.gap = gap + 'px';
    el.innerHTML = creatures.map(c => {
        const isMust = mustAnswer.has(c.name);
        const cls = 'card-badge ' + (isMust ? 'must-answer' : 'threat');
        const shortName = c.name.length > 10 ? c.name.substring(0, 9) + '…' : c.name;
        return `<div class="${cls}" style="width:${cardWidth}px">
            <span class="badge-name">${shortName}</span>
            <span class="badge-sub">${c.power}/${c.toughness}</span>
        </div>`;
    }).join('');
    el.classList.add('visible');
}

let lastAdvice = null;

function showDebrief(data) {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('no-match');
    const result = data?.result || '?';
    const resultColor = result === 'Win' ? '#81c784' : '#ef5350';
    overlay.innerHTML = `
        <div style="text-align:center;padding:8px 0">
            <div style="font-size:18px;font-weight:700;color:${resultColor}">${result}</div>
            <div style="font-size:11px;color:#888;margin-top:4px">Match complete</div>
            <div style="margin-top:8px;font-size:11px">
                <a href="http://localhost:8765/review" target="_blank"
                   style="color:#90caf9;text-decoration:none">
                    Open Post-Game Review →
                </a>
            </div>
        </div>
    `;
    // Auto-hide after 15 seconds
    setTimeout(() => {
        overlay.classList.add('no-match');
        overlay.innerHTML = '<div class="opp-line"><span class="waiting" id="waiting-msg">Waiting for match...</span></div>';
    }, 15000);
}

function resetOverlay() {
    inMatch = false;
    document.getElementById('hand-badges').classList.remove('visible');
    document.getElementById('threat-badges').classList.remove('visible');
    document.getElementById('key-play').style.display = 'none';
    document.getElementById('threat-line').classList.remove('visible');
    document.getElementById('do-now').classList.remove('visible');
    document.getElementById('opp-line').innerHTML =
        '<span class="waiting" id="waiting-msg">Waiting for match...</span>';
    document.getElementById('phase-line').textContent = '';
}

connect();
</script>
</body>
</html>
